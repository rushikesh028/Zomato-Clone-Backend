spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
spring.datasource.url=jdbc:h2:mem:tastybuddy-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

jwt.secret=test-secret-key-with-32-characters!!
jwt.expiration-ms=3600000

razorpay.key=test-key
razorpay.secret=test-secret

management.endpoints.web.exposure.include=health,info
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.seed-data=false
app.seed.admin-email=admin@tastybuddy.local
app.seed.admin-password=Admin@123
springdoc.swagger-ui.path=/swagger-ui.html
